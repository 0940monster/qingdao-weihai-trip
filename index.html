<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>青岛威海四日游 母女版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e8e8;display:flex;flex-direction:column;align-items:center;padding:24px 0;font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;color:#222}
.page{width:210mm;min-height:297mm;background:#fff;padding:7mm 8mm 8mm;box-shadow:0 4px 24px rgba(0,0,0,.12);margin-bottom:24px;position:relative;overflow:hidden;page-break-after:always;font-size:10pt}
.ph{display:flex;justify-content:space-between;align-items:center;padding-bottom:3mm;border-bottom:2px solid #ddd;margin-bottom:3mm}
.ph h2{font-size:22pt;font-weight:900;letter-spacing:1px}
.ph .pr{text-align:right;font-size:8pt;color:#666;line-height:1.6}
.sec{font-size:11pt;font-weight:700;margin:3mm 0 2mm;padding-left:6px;border-left:3px solid;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:2.5mm;margin:2mm 0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2.5mm;margin:2mm 0}
.gc{background:#f7f9fc;border-radius:5px;padding:2.5mm;border:1px solid #e8e8e8;font-size:9pt;line-height:1.6}
.sch{width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:2mm}
.sch th{font-weight:700;padding:3px 5px;text-align:left;font-size:8.5pt;color:#fff}
.sch td{padding:3px 5px;border-bottom:1px solid #eee;vertical-align:top;line-height:1.5}
.sch tr:nth-child(even){background:#fafafa}
.sch .tm{width:40px;font-weight:700;font-size:8.5pt;white-space:nowrap}
.bgt{width:100%;border-collapse:collapse;font-size:9pt;margin:2mm 0}
.bgt th{font-weight:700;padding:2px 5px;text-align:left;font-size:8pt;color:#fff}
.bgt td{padding:2px 5px;border-bottom:1px solid #eee}
.bgt .tr{font-weight:700;background:#f0f4f8!important}
.db{border-radius:5px;padding:2.5mm 3mm;margin:2mm 0;font-size:9pt;border:1px solid;line-height:1.7}
.tp{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;margin:1mm 0}
.ti{font-size:8pt;padding:2px 0 2px 16px;position:relative;color:#444;line-height:1.5}
.sr{display:flex;justify-content:space-around;background:#e91e63;color:#fff;border-radius:6px;padding:3mm;margin:2mm 0;flex-wrap:wrap;gap:5px}
.sr .si{text-align:center}
.sr .si .sv{font-weight:900;font-size:14pt}
.sr .si .sl{font-size:7pt;opacity:.8}
.btn{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:#e91e63;color:#fff;border:none;font-size:20pt;cursor:pointer;z-index:100}
@media print{body{background:#fff;padding:0}.page{width:100%;min-height:100vh;box-shadow:none;margin:0;padding:7mm 8mm;break-after:page}.btn{display:none}}
@page{size:A4;margin:0}
</style>
</head>
<body>
<div class="page">
<h2>青岛·威海 母女高铁游</h2>
<p>2026年8月 · 昆山玉山火炬新村出发 · 预算¥4,258</p>
<p><b>Day 1:</b> 昆山→青岛（高铁约5h）→栈桥→天主教堂→五四广场灯光秀</p>
<p><b>Day 2:</b> 海底世界→海军博物馆→信号山→太平山索道→八大关→台东夜市</p>
<p><b>Day 3:</b> 青岛→威海（高铁1.5h）→刘公岛→幸福门→韩乐坊</p>
<p><b>Day 4:</b> 那香海→摩天轮→荣成站→高铁返程</p>
<p>详细攻略请查看桌面版HTML文件或JPG图片。</p>
</div>
</body>
</html>
